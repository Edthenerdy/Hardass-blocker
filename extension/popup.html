<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
  <title>Holdfast</title>
</head>
<body>
  <header class="head">
    <svg viewBox="0 0 120 120" width="26" height="26" aria-hidden="true">
      <rect x="20" y="20" width="80" height="80" rx="20" fill="#FF3B30" /><rect x="26" y="46" width="68" height="48" rx="24" fill="#A7ABB2" /><circle cx="38" cy="58" r="3" fill="#7C8188" /><circle cx="82" cy="60" r="2.5" fill="#7C8188" /><circle cx="40" cy="86" r="2.5" fill="#7C8188" /><circle cx="82" cy="84" r="3" fill="#7C8188" /><path d="M43 57L55 61" stroke="#0E0E10" stroke-width="4.4" stroke-linecap="round" /><path d="M77 57L65 61" stroke="#0E0E10" stroke-width="4.4" stroke-linecap="round" /><circle cx="50" cy="70" r="5.5" fill="#0E0E10" /><circle cx="70" cy="70" r="5.5" fill="#0E0E10" /><circle cx="48" cy="68" r="1.8" fill="#F4F1EC" /><circle cx="68" cy="68" r="1.8" fill="#F4F1EC" /><path d="M54 84L66 84" stroke="#0E0E10" stroke-width="3.8" stroke-linecap="round" />
    </svg>
    <div class="brand">
      <strong>Holdfast</strong>
      <span>The blocker you can't talk your way out of.</span>
    </div>
  </header>

  <div id="managedBanner" class="managedBanner" hidden></div>

  <button id="winStrip" class="winStrip" title="Estimated at 15 min per blocked visit. Click for your history." hidden></button>

  <div id="addWrap">
    <div class="add">
      <input id="siteInput" type="text" placeholder="instagram.com" aria-label="Site to block" autocomplete="off" spellcheck="false" />
      <button id="addBtn">Block</button>
    </div>
    <p id="addHint" class="hint"></p>
  </div>

  <div class="listHead">
    <span>Blocked sites</span>
    <span id="count">0</span>
  </div>
  <ul id="list" class="list"></ul>
  <p id="empty" class="empty" hidden>Nothing blocked yet. Add a site above.</p>

  <button id="optionsBtn" class="ghost">Settings, team &amp; history</button>

  <script src="common.js"></script>
  <script src="popup.js"></script>
</body>
</html>
