<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked. On purpose.</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <main class="wrap">
    <svg class="logo" viewBox="0 0 120 120" width="56" height="56" aria-hidden="true">
      <rect x="20" y="20" width="80" height="80" rx="20" fill="#FF3B30" />
      <rect x="26" y="46" width="68" height="48" rx="24" fill="#A7ABB2" />
      <circle cx="38" cy="58" r="3" fill="#7C8188" /><circle cx="82" cy="60" r="2.5" fill="#7C8188" />
      <circle cx="40" cy="86" r="2.5" fill="#7C8188" /><circle cx="82" cy="84" r="3" fill="#7C8188" />
      <path d="M43 57 L55 61" stroke="#0E0E10" stroke-width="4.4" stroke-linecap="round" />
      <path d="M77 57 L65 61" stroke="#0E0E10" stroke-width="4.4" stroke-linecap="round" />
      <circle cx="50" cy="70" r="5.5" fill="#0E0E10" /><circle cx="70" cy="70" r="5.5" fill="#0E0E10" />
      <circle cx="48" cy="68" r="1.8" fill="#F4F1EC" /><circle cx="68" cy="68" r="1.8" fill="#F4F1EC" />
      <path d="M54 84 L66 84" stroke="#0E0E10" stroke-width="3.8" stroke-linecap="round" />
    </svg>

    <h1 id="headline">Blocked. On purpose.</h1>
    <p id="sub" class="sub"></p>

    <div id="timer" class="timer">--:--</div>
    <p id="timerCap" class="cap">You haven't started the cooldown yet.</p>

    <div id="stats" class="stats" hidden></div>

    <label id="reasonLabel" class="reasonLabel" for="reason" hidden>Tell me why. In writing.</label>
    <textarea id="reason" hidden placeholder="Because…"></textarea>
    <p id="reasonHint" class="hint" hidden></p>

    <div class="actions">
      <button id="startBtn" class="primary">Start the cooldown</button>
      <button id="unblockBtn" class="danger" hidden disabled>Unblock</button>
    </div>

    <button id="backBtn" class="ghost">Nope — take me back</button>
  </main>

  <script src="common.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
