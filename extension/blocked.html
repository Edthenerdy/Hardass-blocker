<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked. On purpose.</title>
  <link rel="stylesheet" href="blocked.css" />
</head>
<body>
  <main class="wrap">
    <svg class="logo" viewBox="0 0 120 120" width="56" height="56" aria-hidden="true">
      <rect x="20" y="20" width="80" height="80" rx="20" fill="#FF3B30" />
      <rect x="34" y="54" width="54" height="12" rx="6" fill="#0E0E10" />
      <circle cx="44" cy="60" r="12" fill="#0E0E10" />
    </svg>

    <h1 id="headline">Blocked. On purpose.</h1>
    <p id="sub" class="sub"></p>

    <div id="timer" class="timer">--:--</div>
    <p id="timerCap" class="cap">You haven't started the cooldown yet.</p>

    <div id="stats" class="stats" hidden></div>

    <label id="reasonLabel" class="reasonLabel" for="reason" hidden>Tell me why. In writing.</label>
    <textarea id="reason" hidden placeholder="Because…"></textarea>
    <p id="reasonHint" class="hint" hidden></p>

    <div class="actions">
      <button id="startBtn" class="primary">Start the cooldown</button>
      <button id="unblockBtn" class="danger" hidden disabled>Unblock</button>
    </div>

    <button id="backBtn" class="ghost">Nope — take me back</button>
  </main>

  <script src="common.js"></script>
  <script src="blocked.js"></script>
</body>
</html>
